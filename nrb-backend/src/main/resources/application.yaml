server:
  port: 8080
spring:
  datasource:
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/nrb_ticketing
    driver-class-name: com.mysql.cj.jdbc.Driver
    application:
      name: nrb-ticketing-tool
jwt:
  secret: MySuperSecretJwtKeyForTicketingApplication123456789
  expiration: 86400000

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
  Jackson:
    time-zone: Asia/Kolkata

  logging:
    level:
      org.hibernate.SQL: DEBUG
      org.hibernate.orm.jdbc.bind: TRACE
      org:
        springframework:
          security: DEBUG